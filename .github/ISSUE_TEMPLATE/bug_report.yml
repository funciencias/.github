name: Bug report
description: Reportar un problema reproducible
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: ¿Qué está fallando?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Hacer clic en...
        3. Ver error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidencia
      description: Capturas, logs o URLs relevantes. No pegar secretos.
